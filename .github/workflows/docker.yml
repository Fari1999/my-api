name: Build and Deploy Docker Image

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: self-hosted

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Build Docker image
      run: docker build -t my-api .

    - name: Deploy to VM via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VM_IP }}
        username: test
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          cd ~/my-api
          git pull
          ./deploy.sh
